version: "3.9"

services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: prova_backend

    ports:
      - "5432:5432"

  backend:
    build: .
    container_name: backend_api
    restart: always

    ports:
      - "8000:8000"

    depends_on:
      - db